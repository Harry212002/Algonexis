version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: algonexis_backend

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn core.wsgi:application --bind 0.0.0.0:8000
      "

    volumes:
      - ./backend:/app
      - sqlite_data:/app/data

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: algonexis_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  sqlite_data: